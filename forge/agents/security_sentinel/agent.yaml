# ─────────────────────────────────────────────────────────────
# Security Sentinel Agent — Vulnerability & Compliance Scanning
# Scans code, configs, and dependencies for vulnerabilities,
# CVEs, and compliance violations. Maps findings to OWASP, CWE,
# and CVSS frameworks.
# Specialist agent — dispatched by Plan Agent for security audits.
# ─────────────────────────────────────────────────────────────
id: security_sentinel
name: Security Sentinel Agent
type: specialist
version: "1.0.0"
description: >
  Scans code, configurations, and dependencies for security vulnerabilities,
  CVEs, and compliance violations. Maps findings to OWASP, CWE, and CVSS frameworks.

context_budget:
  max_input_tokens: 15000
  max_output_tokens: 7000   # 22K envelope
  strategy: priority            # security findings ranked by severity

skills:
  - skills/security_scan.yaml

prompts:
  - prompts/system.md

instructions:
  - instructions/frameworks.md

tags: [security, vulnerability, cve, audit, compliance, owasp]
