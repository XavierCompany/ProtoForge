# manage_issues skill
name: manage_issues
description: >
  Create, update, close, and comment on GitHub issues.  Generates
  structured issue bodies documenting commits, features, and fixes.
  Auto-applies labels based on change type and links issues to
  commits and pull requests.
agent_type: github_tracker
version: "1.0.0"
tags: [github, issue, tracking, documentation]

parameters:
  action:
    type: string
    description: "Action to perform: create, update, close, comment, list"
    required: true
    enum: [create, update, close, comment, list]
  repo:
    type: string
    description: "Repository in owner/name format (e.g. XavierCompany/ProtoForge)"
    required: false
  issue_number:
    type: integer
    description: "Issue number (required for update/close/comment)"
    required: false
  title:
    type: string
    description: "Issue title (required for create, optional for update)"
    required: false
  body:
    type: string
    description: "Issue body or comment text"
    required: false
  labels:
    type: array
    items: { type: string }
    description: "Labels to apply (auto-detected if not provided)"
    required: false
  commit_sha:
    type: string
    description: "Link issue to this commit"
    required: false
  close_reason:
    type: string
    description: "Reason for closing (completed, not_planned)"
    required: false
    enum: [completed, not_planned]

output:
  type: object
  properties:
    issue_number:
      type: integer
      description: The created or updated issue number
    issue_url:
      type: string
      description: Full URL to the GitHub issue
    action_taken:
      type: string
      description: Description of what was done
    labels_applied:
      type: array
      items: { type: string }

examples:
  - input: "Create an issue documenting the code quality audit commit"
    output: "Created issue #5: [Chore] Code quality audit - 30 lint violations fixed"
  - input: "Close issue #3 as completed with commit a3aaefc"
    output: "Closed issue #3 linked to commit a3aaefc"
