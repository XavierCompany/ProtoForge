# ─────────────────────────────────────────────────────────────
# Code Research Agent — Codebase Navigation & Analysis
# Navigates codebases, searches functions, traces execution
# flows, and identifies dependencies across files and modules.
# Specialist agent — dispatched by Plan Agent for code queries.
# ─────────────────────────────────────────────────────────────
id: code_research
name: Code Research Agent
type: specialist
description: >
  Expert in codebase navigation, code search, function lookup,
  and implementation analysis. Traces execution flows and
  identifies dependencies across files and modules.

version: "1.0.0"

context_budget:
  max_input_tokens: 17000
  max_output_tokens: 8000   # 25K envelope — heavy specialist
  strategy: sliding_window  # code navigation benefits from recent context
  priority_order:
    - system_prompt
    - current_message
    - code_snippets
    - recent_history

subagents: []

prompts:
  system: system.md

skills:
  - search_code.yaml

instructions:
  - search_patterns.md

tags: [code, search, functions, architecture, navigation]
