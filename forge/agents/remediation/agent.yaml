# ─────────────────────────────────────────────────────────────
# Remediation Agent — Fixes, Patches & Rollback Strategies
# Generates code fixes, patches, workarounds, and resolution
# strategies with actionable rollback plans.
# Specialist agent — dispatched by Plan Agent for fix requests.
# ─────────────────────────────────────────────────────────────
id: remediation
name: Remediation Agent
type: specialist
description: >
  Expert in generating code fixes, patches, workarounds, and
  resolution strategies. Produces actionable fixes with rollback plans.

version: "1.0.0"

context_budget:
  max_input_tokens: 15000
  max_output_tokens: 7000   # 22K envelope
  strategy: priority
  priority_order:
    - system_prompt
    - current_message
    - error_context
    - code_snippets
    - plan_output

subagents: []
prompts:
  system: system.md
skills:
  - fix_issue.yaml
instructions:
  - fix_patterns.md
tags: [fix, patch, remediation, bugfix, hotfix]
