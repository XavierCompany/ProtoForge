<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProtoForge — Agent Inspector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; }
        .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header-left h1 { font-size: 20px; color: #58a6ff; }
        .header-left p { font-size: 13px; color: #8b949e; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
        .card h2 { font-size: 14px; color: #58a6ff; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #21262d; }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: #8b949e; }
        .stat-value { color: #c9d1d9; font-weight: 600; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .badge-active { background: #1b4332; color: #3fb950; }
        .badge-error { background: #3d1f28; color: #f85149; }
        .badge-warn { background: #3d2e00; color: #d29922; }
        .full-width { grid-column: span 2; }
        .chat-input { display: flex; gap: 8px; margin-top: 12px; }
        .chat-input input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #c9d1d9; font-size: 14px; }
        .chat-input button { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; font-size: 14px; }
        .chat-input button:hover { background: #2ea043; }
        .chat-input button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        #messages { max-height: 300px; overflow-y: auto; padding: 8px; }
        .msg { padding: 8px 12px; margin: 4px 0; border-radius: 6px; font-size: 14px; word-break: break-word; }
        .msg-user { background: #1f2937; }
        .msg-agent { background: #0d2137; border-left: 3px solid #58a6ff; white-space: pre-wrap; }
        .msg-system { background: #1c1c1c; border-left: 3px solid #d29922; color: #d29922; font-size: 13px; }
        #agents-list, #skills-list { max-height: 250px; overflow-y: auto; }
        .item { padding: 8px; border-bottom: 1px solid #21262d; font-size: 13px; }

        /* Notification badge */
        .notif-badge { position: relative; display: inline-flex; align-items: center; gap: 8px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 14px; }
        .notif-badge:hover { border-color: #58a6ff; }
        .notif-count { background: #f85149; color: #fff; font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
        .notif-count.hidden { display: none; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .notif-count.active { animation: pulse 1s ease-in-out infinite; }

        /* HITL Review Panel */
        .review-panel { border: 1px solid #d29922; border-radius: 8px; background: #1a1500; padding: 14px; margin-bottom: 12px; }
        .review-panel h3 { color: #d29922; font-size: 13px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .review-type { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
        .review-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin: 4px 0; background: #21262d; border-radius: 4px; font-size: 13px; }
        .review-item input[type="checkbox"] { accent-color: #58a6ff; }
        .review-item label { flex: 1; cursor: pointer; }
        .review-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-accept { background: #238636; color: #fff; }
        .btn-accept:hover { background: #2ea043; }
        .btn-reject { background: #da3633; color: #fff; }
        .btn-reject:hover { background: #f85149; }
        .btn-secondary { background: #30363d; color: #c9d1d9; }
        .btn-secondary:hover { background: #484f58; }
        .brief-input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 8px; color: #c9d1d9; font-size: 13px; margin-top: 8px; }
        .empty-state { color: #484f58; font-size: 13px; text-align: center; padding: 24px; }
        .timer { font-size: 11px; color: #8b949e; float: right; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>&#128295; ProtoForge Agent Inspector</h1>
            <p>Multi-Agent Orchestrator &mdash; Debug &amp; Monitor</p>
        </div>
        <div class="notif-badge" onclick="scrollToReviews()" title="Pending HITL Reviews">
            &#128276; Reviews
            <span id="notif-count" class="notif-count hidden">0</span>
        </div>
    </div>
    <div class="container">
        <div class="grid">
            <!-- Row 1: Status + Agents -->
            <div class="card">
                <h2>System Status</h2>
                <div id="status">Loading...</div>
            </div>
            <div class="card">
                <h2>Registered Agents</h2>
                <div id="agents-list">Loading...</div>
            </div>
            <!-- Row 2: Skills + Workflows -->
            <div class="card">
                <h2>Skill Catalog</h2>
                <div id="skills-list">Loading...</div>
            </div>
            <div class="card">
                <h2>Workflows</h2>
                <div id="workflows-list">Loading...</div>
            </div>
            <!-- Row 3: HITL Reviews (full width) -->
            <div class="card full-width" id="reviews-card">
                <h2>&#9888;&#65039; HITL Reviews <span id="review-count-header" style="color:#d29922"></span></h2>
                <div id="reviews-container">
                    <div class="empty-state">No pending reviews</div>
                </div>
            </div>
            <!-- Row 4: Chat Console (full width) -->
            <div class="card full-width">
                <h2>Chat Console <span id="chat-status-indicator" style="font-size:12px;color:#8b949e"></span></h2>
                <div id="messages"></div>
                <div class="chat-input">
                    <input id="chat-input" placeholder="Send a message to the orchestrator..." onkeydown="if(event.key==='Enter')sendMessage()">
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        // ── State ────────────────────────────────────────────────
        let activeChatTaskId = null;
        let chatPollTimer = null;
        const REVIEW_POLL_MS = 2000;
        const CHAT_POLL_MS = 2000;
        const STATUS_POLL_MS = 10000;
        const HITL_TIMEOUT_S = 120;

        // ── Helpers ──────────────────────────────────────────────
        function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

        function scrollToReviews() {
            document.getElementById('reviews-card').scrollIntoView({ behavior: 'smooth' });
        }

        // ── Status ───────────────────────────────────────────────
        async function loadStatus() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                const el = document.getElementById('status');
                el.innerHTML = `
                    <div class="stat"><span class="stat-label">Status</span><span class="badge badge-active">${esc(data.status)}</span></div>
                    <div class="stat"><span class="stat-label">Provider</span><span class="stat-value">${esc(data.orchestrator.provider)}</span></div>
                    <div class="stat"><span class="stat-label">Session</span><span class="stat-value">${esc((data.orchestrator.session_id || 'N/A').slice(0,8))}...</span></div>
                    <div class="stat"><span class="stat-label">Messages</span><span class="stat-value">${data.orchestrator.message_count}</span></div>
                    <div class="stat"><span class="stat-label">MCP Tools</span><span class="stat-value">${data.mcp.tools_count}</span></div>
                    <div class="stat"><span class="stat-label">Installed Skills</span><span class="stat-value">${data.catalog.installed_skills}</span></div>
                `;
            } catch(e) { document.getElementById('status').textContent = 'Error loading status'; }
        }

        // ── Agents ───────────────────────────────────────────────
        async function loadAgents() {
            try {
                const res = await fetch('/agents');
                const agents = await res.json();
                const el = document.getElementById('agents-list');
                el.innerHTML = agents.map(a => `
                    <div class="item">
                        <strong>${esc(a.name)}</strong> <span class="badge badge-active">${esc(a.status)}</span><br>
                        <span style="color:#8b949e">${esc(a.description)}</span><br>
                        <span style="color:#8b949e">Calls: ${a.usage_count} | Avg: ${a.avg_latency_ms}ms</span>
                    </div>
                `).join('') || '<div class="item">No agents registered</div>';
            } catch(e) { document.getElementById('agents-list').textContent = 'Error loading agents'; }
        }

        // ── Skills ───────────────────────────────────────────────
        async function loadSkills() {
            try {
                const res = await fetch('/skills');
                const skills = await res.json();
                const el = document.getElementById('skills-list');
                el.innerHTML = skills.map(s => `
                    <div class="item">
                        <strong>${esc(s.name)}</strong> v${esc(s.version)} ${s.installed ? '<span class="badge badge-active">installed</span>' : ''}<br>
                        <span style="color:#8b949e">${esc(s.description)}</span>
                    </div>
                `).join('') || '<div class="item">No skills in catalog</div>';
            } catch(e) { document.getElementById('skills-list').textContent = 'Error loading skills'; }
        }

        // ── Workflows ────────────────────────────────────────────
        async function loadWorkflows() {
            try {
                const res = await fetch('/workflows');
                const workflows = await res.json();
                const el = document.getElementById('workflows-list');
                el.innerHTML = workflows.map(w => `
                    <div class="item">
                        <strong>${esc(w.name)}</strong> v${esc(w.version)}<br>
                        <span style="color:#8b949e">${esc(w.description)} (${w.steps} steps)</span>
                    </div>
                `).join('') || '<div class="item">No workflows registered</div>';
            } catch(e) { document.getElementById('workflows-list').textContent = 'Error loading workflows'; }
        }

        // ── HITL Reviews ─────────────────────────────────────────
        async function loadReviews() {
            try {
                const res = await fetch('/reviews/pending');
                const data = await res.json();
                const count = data.count || 0;
                const badge = document.getElementById('notif-count');
                const headerCount = document.getElementById('review-count-header');

                if (count > 0) {
                    badge.textContent = count;
                    badge.classList.remove('hidden');
                    badge.classList.add('active');
                    headerCount.textContent = `(${count} pending)`;
                } else {
                    badge.classList.add('hidden');
                    badge.classList.remove('active');
                    headerCount.textContent = '';
                }

                const container = document.getElementById('reviews-container');
                if (count === 0) {
                    container.innerHTML = '<div class="empty-state">No pending reviews &mdash; pipeline clear</div>';
                    return;
                }

                container.innerHTML = data.pending.map(r => renderReview(r)).join('');
            } catch(e) { /* silent */ }
        }

        function renderReview(r) {
            switch (r.type) {
                case 'plan': return renderPlanReview(r);
                case 'sub_plan': return renderSubPlanReview(r);
                case 'governance_context': return renderGovContextReview(r);
                case 'governance_skill': return renderGovSkillReview(r);
                case 'governance_lifecycle': return renderGovLifecycleReview(r);
                default: return `<div class="review-panel"><h3>${esc(r.type)} Review</h3><pre>${esc(JSON.stringify(r, null, 2))}</pre></div>`;
            }
        }

        function renderPlanReview(r) {
            const items = (r.suggestions || []).map(s => `
                <div class="review-item">
                    <input type="checkbox" id="plan-${r.request_id}-${s.index}" value="${s.index}" checked>
                    <label for="plan-${r.request_id}-${s.index}">
                        <strong>${esc(s.agent_id)}</strong> &mdash; ${esc(s.summary)}
                        <span style="color:#484f58; font-size:11px">[${esc((s.keywords||[]).join(', '))}]</span>
                    </label>
                </div>
            `).join('');
            return `
                <div class="review-panel" data-review-id="${r.request_id}">
                    <h3>Plan Agent Review <span class="timer" id="timer-${r.request_id}"></span></h3>
                    <div class="review-type">The Plan Agent recommends these sub-agents. Select which should proceed:</div>
                    <div style="font-size:13px;color:#c9d1d9;margin-bottom:8px">${esc(r.plan_summary || '')}</div>
                    ${items}
                    <div class="review-actions">
                        <button class="btn btn-accept" onclick="acceptPlan('${r.request_id}')">Accept Selected</button>
                        <button class="btn btn-secondary" onclick="acceptPlanAll('${r.request_id}', ${(r.suggestions||[]).length})">Accept All</button>
                        <button class="btn btn-reject" onclick="rejectPlan('${r.request_id}')">Reject All</button>
                    </div>
                </div>
            `;
        }

        function renderSubPlanReview(r) {
            const items = (r.resources || []).map(res => `
                <div class="review-item">
                    <input type="checkbox" id="sp-${r.request_id}-${res.index}" value="${res.index}" checked>
                    <label for="sp-${r.request_id}-${res.index}">
                        <strong>${esc(res.name)}</strong> (${esc(res.type)}) &mdash; ${esc(res.purpose)}
                        <span style="color:#484f58;font-size:11px"> [effort: ${esc(res.effort)}]</span>
                    </label>
                </div>
            `).join('');
            return `
                <div class="review-panel" data-review-id="${r.request_id}">
                    <h3>Sub-Plan Resource Review <span class="timer" id="timer-${r.request_id}"></span></h3>
                    <div class="review-type">The Sub-Plan Agent proposes these resources. Select which to provision:</div>
                    <div style="font-size:13px;color:#c9d1d9;margin-bottom:8px">${esc(r.resource_summary || '')}</div>
                    ${items}
                    <input class="brief-input" id="brief-${r.request_id}" placeholder="Optional: override the default brief..." value="${esc(r.user_brief || '')}">
                    <div class="review-actions">
                        <button class="btn btn-accept" onclick="acceptSubPlan('${r.request_id}')">Accept Selected</button>
                        <button class="btn btn-secondary" onclick="acceptSubPlanAll('${r.request_id}', ${(r.resources||[]).length})">Accept All</button>
                        <button class="btn btn-reject" onclick="rejectSubPlan('${r.request_id}')">Reject All</button>
                    </div>
                </div>
            `;
        }

        function renderGovContextReview(r) {
            return `
                <div class="review-panel" data-review-id="${r.request_id}">
                    <h3>Governance: Context Window <span class="timer" id="timer-${r.request_id}"></span></h3>
                    <div class="review-type">Context window is nearing the 128K cap. Accept decomposition?</div>
                    <pre style="background:#0d1117;padding:8px;border-radius:4px;font-size:12px;max-height:150px;overflow:auto">${esc(JSON.stringify(r, null, 2))}</pre>
                    <div class="review-actions">
                        <button class="btn btn-accept" onclick="resolveGovContext('${r.request_id}', true)">Accept Decomposition</button>
                        <button class="btn btn-reject" onclick="resolveGovContext('${r.request_id}', false)">Reject</button>
                    </div>
                </div>
            `;
        }

        function renderGovSkillReview(r) {
            return `
                <div class="review-panel" data-review-id="${r.request_id}">
                    <h3>Governance: Skill Cap <span class="timer" id="timer-${r.request_id}"></span></h3>
                    <div class="review-type">An agent exceeds the 4-skill cap. Accept the proposed split?</div>
                    <pre style="background:#0d1117;padding:8px;border-radius:4px;font-size:12px;max-height:150px;overflow:auto">${esc(JSON.stringify(r, null, 2))}</pre>
                    <div class="review-actions">
                        <button class="btn btn-accept" onclick="resolveGovSkill('${r.request_id}', true)">Accept Split</button>
                        <button class="btn btn-reject" onclick="resolveGovSkill('${r.request_id}', false)">Reject</button>
                    </div>
                </div>
            `;
        }

        function renderGovLifecycleReview(r) {
            return `
                <div class="review-panel" data-review-id="${r.request_id}">
                    <h3>Governance: Agent Lifecycle <span class="timer" id="timer-${r.request_id}"></span></h3>
                    <div class="review-type">An agent disable/remove request is pending approval.</div>
                    <pre style="background:#0d1117;padding:8px;border-radius:4px;font-size:12px;max-height:150px;overflow:auto">${esc(JSON.stringify(r, null, 2))}</pre>
                    <div class="review-actions">
                        <button class="btn btn-accept" onclick="resolveGovLifecycle('${r.request_id}', true)">Approve</button>
                        <button class="btn btn-reject" onclick="resolveGovLifecycle('${r.request_id}', false)">Deny</button>
                    </div>
                </div>
            `;
        }

        // ── Review Actions ───────────────────────────────────────
        function getCheckedIndices(prefix, requestId) {
            return Array.from(document.querySelectorAll(`input[id^="${prefix}-${requestId}-"]:checked`))
                .map(cb => parseInt(cb.value));
        }

        async function acceptPlan(requestId) {
            const indices = getCheckedIndices('plan', requestId);
            await fetch('/plan/accept', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted_indices: indices }),
            });
            loadReviews();
        }

        async function acceptPlanAll(requestId, count) {
            const indices = Array.from({length: count}, (_, i) => i);
            await fetch('/plan/accept', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted_indices: indices }),
            });
            loadReviews();
        }

        async function rejectPlan(requestId) {
            await fetch('/plan/accept', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted_indices: [] }),
            });
            loadReviews();
        }

        async function acceptSubPlan(requestId) {
            const indices = getCheckedIndices('sp', requestId);
            const brief = document.getElementById(`brief-${requestId}`)?.value || '';
            await fetch('/sub-plan/accept', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted_indices: indices, user_brief: brief }),
            });
            loadReviews();
        }

        async function acceptSubPlanAll(requestId, count) {
            const indices = Array.from({length: count}, (_, i) => i);
            const brief = document.getElementById(`brief-${requestId}`)?.value || '';
            await fetch('/sub-plan/accept', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted_indices: indices, user_brief: brief }),
            });
            loadReviews();
        }

        async function rejectSubPlan(requestId) {
            await fetch('/sub-plan/accept', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted_indices: [], user_brief: '' }),
            });
            loadReviews();
        }

        async function resolveGovContext(requestId, accepted) {
            await fetch('/governance/context-reviews/resolve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted }),
            });
            loadReviews();
        }

        async function resolveGovSkill(requestId, accepted) {
            await fetch('/governance/skill-reviews/resolve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted }),
            });
            loadReviews();
        }

        async function resolveGovLifecycle(requestId, accepted) {
            await fetch('/governance/lifecycle-reviews/resolve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ request_id: requestId, accepted }),
            });
            loadReviews();
        }

        // ── Non-blocking Chat ────────────────────────────────────
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('send-btn');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            btn.disabled = true;

            const messagesEl = document.getElementById('messages');
            messagesEl.innerHTML += `<div class="msg msg-user">&#129489; ${esc(msg)}</div>`;
            messagesEl.innerHTML += `<div class="msg msg-system" id="chat-processing">&#9203; Processing... The orchestrator may pause for HITL reviews. Check the Reviews panel above.</div>`;
            messagesEl.scrollTop = messagesEl.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg }),
                });
                const data = await res.json();
                activeChatTaskId = data.task_id;
                document.getElementById('chat-status-indicator').textContent = `[Task: ${(data.task_id || '').slice(0,8)}... processing]`;
                startChatPolling();
            } catch(e) {
                document.getElementById('chat-processing')?.remove();
                messagesEl.innerHTML += `<div class="msg msg-agent" style="border-color:#f85149">&#10060; Error: ${esc(e.message)}</div>`;
                btn.disabled = false;
            }
        }

        function startChatPolling() {
            if (chatPollTimer) clearInterval(chatPollTimer);
            chatPollTimer = setInterval(pollChatStatus, CHAT_POLL_MS);
        }

        async function pollChatStatus() {
            if (!activeChatTaskId) return;
            try {
                const res = await fetch(`/chat/status/${activeChatTaskId}`);
                const data = await res.json();
                const indicator = document.getElementById('chat-status-indicator');

                if (data.status === 'completed') {
                    clearInterval(chatPollTimer);
                    chatPollTimer = null;
                    activeChatTaskId = null;
                    document.getElementById('chat-processing')?.remove();
                    const messagesEl = document.getElementById('messages');
                    const raw = data.response;
                    const response = (typeof raw === 'string' && raw) ? raw : '(empty response)';
                    messagesEl.innerHTML += `<div class="msg msg-agent">&#129302; ${esc(response)}</div>`;
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                    indicator.textContent = '';
                    document.getElementById('send-btn').disabled = false;
                    loadStatus();
                } else if (data.status === 'error') {
                    clearInterval(chatPollTimer);
                    chatPollTimer = null;
                    activeChatTaskId = null;
                    document.getElementById('chat-processing')?.remove();
                    const messagesEl = document.getElementById('messages');
                    messagesEl.innerHTML += `<div class="msg msg-agent" style="border-color:#f85149">&#10060; Error: ${esc(data.error || 'Unknown error')}</div>`;
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                    indicator.textContent = '';
                    document.getElementById('send-btn').disabled = false;
                } else {
                    // Still processing
                    const elapsed = Math.round(data.elapsed_seconds || 0);
                    const pending = data.pending_reviews?.length || 0;
                    indicator.textContent = `[${elapsed}s elapsed${pending > 0 ? ` | ${pending} review(s) pending` : ''}]`;

                    // When HITL reviews appear, refresh the review panel and alert the user
                    if (pending > 0) {
                        loadReviews();
                        scrollToReviews();
                        const badge = document.getElementById('notif-count');
                        badge.classList.add('active');
                        badge.style.animation = 'none';
                        badge.offsetHeight; // trigger reflow
                        badge.style.animation = 'pulse 0.6s ease-in-out 3';
                    }
                }
            } catch(e) { console.warn('chat_poll_error', e); }
        }

        // ── Init ─────────────────────────────────────────────────
        loadStatus();
        loadAgents();
        loadSkills();
        loadWorkflows();
        loadReviews();

        setInterval(loadStatus, STATUS_POLL_MS);
        setInterval(loadReviews, REVIEW_POLL_MS);
    </script>
</body>
